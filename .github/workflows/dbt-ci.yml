name: dbt CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: python -m pip install "dbt-core>=1.8,<2.0" "dbt-duckdb>=1.8,<2.0"

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: Build models and run tests
        run: dbt build --profiles-dir .

      - name: Generate docs
        run: dbt docs generate --profiles-dir .
