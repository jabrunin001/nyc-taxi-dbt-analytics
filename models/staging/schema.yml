version: 2

models:
  - name: stg_taxi_trips
    description: Cleaned and typed taxi trip records from the public sample dataset.
    columns:
      - name: trip_id
        description: Stable trip identifier from the source file.
        tests:
          - not_null
          - unique
      - name: pickup_at
        description: Trip pickup timestamp.
        tests:
          - not_null
      - name: dropoff_at
        description: Trip dropoff timestamp.
        tests:
          - not_null
      - name: payment_type
        description: Normalized payment method.
        tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'cash']
      - name: trip_distance_miles
        description: Trip distance in miles.
        tests:
          - non_negative
      - name: total_amount
        description: Total charged amount in dollars.
        tests:
          - non_negative
